<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AZ antiques japan Estimate</title>
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/madori-icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#151324" />
    <meta name="apple-mobile-web-app-title" content="AZ Estimate" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-panel" aria-label="坪・平米・畳 電卓">
        <header class="brand-row">
          <div>
            <p class="eyebrow">AREA & SAKAN ESTIMATE</p>
            <h1>AZ antiques japan</h1>
          </div>
          <div class="brand-total" aria-label="総額">
            <span>総額</span>
            <strong id="headerTotal">¥0</strong>
          </div>
        </header>

        <section class="converter-grid">
          <section class="calculator-card">
            <div class="input-stage">
              <input id="areaInput" type="number" value="10" min="0" step="0.01" aria-label="数値" />
              <div class="unit-badge" id="inputUnitLabel">坪</div>
            </div>

            <div class="unit-tabs" aria-label="入力する単位">
              <button class="unit-button active" data-unit="tsubo" type="button">坪</button>
              <button class="unit-button" data-unit="m2" type="button">平米</button>
              <button class="unit-button" data-unit="tatami" type="button">畳</button>
            </div>

            <div class="result-stack">
              <article class="result-row highlight">
                <span>坪</span>
                <strong id="tsuboResult">0</strong>
              </article>
              <article class="result-row">
                <span>平米</span>
                <strong id="m2Result">0</strong>
              </article>
              <article class="result-row">
                <span>畳</span>
                <strong id="tatamiResult">0</strong>
              </article>
            </div>

            <button class="clear-button" id="clearButton" type="button">クリア</button>
            <p class="note">1坪 = 3.305785平米、1畳 = 1.6562平米。畳数は概算です。</p>
          </section>

          <section class="estimate-card" aria-label="左官塗装見積もり">
            <div class="section-heading">
              <p class="eyebrow">SAKAN PAINT</p>
              <h2>左官塗装 見積もり</h2>
            </div>

            <div class="estimate-fields">
              <label class="wide-field">
                施工平米
                <span class="input-wrap"><input id="sakanArea" type="number" value="33.06" min="0" step="0.01" />m2</span>
              </label>
              <label>
                左官塗装 平米単価
                <span class="input-wrap"><input id="sakanRate" type="number" value="55000" min="0" step="1000" />円</span>
              </label>
              <label>
                デザイン単価
                <span class="input-wrap"><input id="designRate" type="number" value="11000" min="0" step="1000" />円</span>
              </label>
            </div>

            <div class="toggle-row">
              <label class="toggle-line">
                <input id="syncArea" type="checkbox" checked />
                換算した平米を施工平米へ反映
              </label>
              <label class="toggle-line">
                <input id="includeDesign" type="checkbox" checked />
                デザイン費を含める
              </label>
            </div>

            <div class="total-box">
              <span>施工金額</span>
              <strong id="grandTotal">¥0</strong>
            </div>

            <div class="breakdown-grid">
              <article>
                <span>左官塗装費</span>
                <strong id="sakanCost">¥0</strong>
              </article>
              <article>
                <span>デザイン費</span>
                <strong id="designCost">¥0</strong>
              </article>
              <article>
                <span>税込目安</span>
                <strong id="taxTotal">¥0</strong>
              </article>
              <article>
                <span>計算式</span>
                <strong id="formulaText">-</strong>
              </article>
            </div>
          </section>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
